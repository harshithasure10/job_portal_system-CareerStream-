
<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/font-awesome.min.css}"/>
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Sign Up | CareerStream</title>

    <style>
        /* Ensures smooth stacking on mobile devices */
        @media (max-width: 991px) {
            .coffee_mug_background {
                height: 35vh !important; /* Smaller image height when at the top */
                background-position: center !important;
            }
            .top-margin {
                margin-top: 30px !important;
                padding-bottom: 50px;
            }
            .logo_left {
                margin-left: 0 !important;
                padding-left: 0 !important;
                text-align: center;
                width: 100%;
            }
            .ms-5 { margin-left: 0 !important; }
        }

        /* Ensures background covers full height on desktop */
        .coffee_mug_background {
            height: 100vh;
            background-size: cover;
        }

        body, html {
            overflow-x: hidden;
        }
    </style>
</head>

<body>
<section class="content hidden-overflow">
    <div class="row g-0">

        <div class="col-lg-6 col-md-12 coffee_mug_background">
            <div class="logo_left mt-3 pt-4 ms-5 pl-5">
                <h2 class="logo" style="color: white">
                    Career Stream <span class="logo_com">.com</span>
                </h2>
            </div>
        </div>

        <div class="col-lg-6 col-md-12 bg-white">
            <div class="top-margin">
                <div>
                    <div class="d-flex justify-content-center mb-4">
                        <h1 class="heading_font font-weight-bold">
                            Create User Account
                        </h1>
                    </div>
                    <div class="myForm">
                        <form th:action="@{/register/new}" th:object="${user}" method="post">
                            <div class="box-body bozero mx2p">
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="form-group mb-3">
                                            <input
                                                    placeholder="Email"
                                                    name="email"
                                                    th:field="*{email}"
                                                    type="email"
                                                    style="width: 100%"
                                                    class="form-control"
                                                    required
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="form-group mb-3">
                                            <input
                                                    min="8"
                                                    placeholder="Password"
                                                    name="password"
                                                    th:field="*{password}"
                                                    type="password"
                                                    class="form-control pwd"
                                                    required
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12 form-group">
                                        <select
                                                required
                                                class="form-control"
                                                th:field="*{userTypeId}"
                                                style="height: 50px;"
                                        >
                                            <option value="" selected>Choose your role...</option>
                                            <th:block th:each="userType :${getAllTypes}">
                                                <option
                                                        th:text="${userType.userTypeName}"
                                                        th:value="${userType.userTypeId}"
                                                ></option>
                                            </th:block>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="box-footer">
                                <div class="row">
                                    <div class="form-group mt-5 col-md-12">
                                        <button type="submit" class="myBtn py-3 w-100">Save</button>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-3">
                                <hr>
                                <p class="text-center text-muted">Or sign up using</p>
                                <div class="d-grid gap-2">
                                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-dark btn-block shadow-sm btn-block d-flex align-items-center justify-content-center">
                                        <i class="fab fa-google me-2"></i> Continue with Google
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>

</body>
</html>
