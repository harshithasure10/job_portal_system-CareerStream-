<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | CareerStream</title>

  <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
  <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/font-awesome.min.css}"/>
  <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}"/>
  <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Ensures the background image behaves like the Register page */
    .coffee_mug_background {
      height: 100vh;
      background-size: cover;
      background-position: center;
    }

    /* Mobile Fix: Stacks columns and adjusts image height */
    @media (max-width: 991px) {
      .coffee_mug_background {
        height: 35vh !important;
      }
      .top-margin {
        margin-top: 20px !important;
        padding: 20px;
      }
      .logo_left {
        margin-left: 0 !important;
        padding-left: 0 !important;
        text-align: center;
        width: 100%;
      }
    }
  </style>
</head>

<body>
<section class="content hidden-overflow">
  <div class="row g-0">

    <div class="col-lg-6 col-md-12 coffee_mug_background">
      <div class="logo_left mt-3 pt-4 ms-5 pl-5">
        <h2 class="logo" style="color: white">
          Career Stream <span class="logo_com">.com</span>
        </h2>
      </div>
    </div>

    <div class="col-lg-6 col-md-12">
      <div class="top-margin">
        <div>
          <div class="d-flex justify-content-center mb-4">
            <h1 class="heading_font font-weight-bold">
              Login to Account
            </h1>
          </div>

          <div class="myForm">
            <form th:action="@{/login}" method="post" class="mx2p">
              <div class="row">
                <div class="col-md-12">
                  <div class="form-group mb-3">
                    <input
                            placeholder="Email"
                            name="username"
                            type="email"
                            style="width: 100%"
                            class="form-control"
                            required
                    />
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-md-12">
                  <div class="form-group mb-3">
                    <input
                            placeholder="Password"
                            name="password"
                            type="password"
                            class="form-control"
                            required
                    />
                  </div>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-12 d-flex justify-content-between">
                  <label class="form-check-label">
                    <input type="checkbox" /> Remember me
                  </label>
                  <a th:href="@{/forgot-password}" class="color-text">Forgot Password?</a>
                </div>
              </div>

              <div class="row">
                <div class="col-md-12">
                  <button type="submit" class="myBtn py-3 w-100">Log in</button>
                </div>
              </div>

              <p class="text-center mt-4">
                Are you a new User?
                <a class="color-text" th:href="@{/register}"> Register Now</a>
              </p>
              <div class="mt-3">
                <hr>
                <div class="d-grid gap-2">
                  <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-dark btn-block shadow-sm btn-block">
                    <i class="fab fa-google"></i> Login with Google
                  </a>
                </div>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
