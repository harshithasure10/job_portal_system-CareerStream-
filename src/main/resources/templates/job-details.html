<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org/" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" style="height: 100%">
<head>
    <meta charset="UTF-8"/>
    <title>Candidate Dashboard</title>
    <meta charset="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <meta name="description" content=""/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}"/>
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css} "/>
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/font-awesome.min.css}"/>
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    <style>
        /* Progress Tracker Styling */
        .stepper-wrapper {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .stepper-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .stepper-item::before {
            position: absolute;
            content: "";
            border-bottom: 2px solid #ccc;
            width: 100%;
            top: 20px;
            left: -50%;
            z-index: 2;
        }
        .stepper-item::after {
            position: absolute;
            content: "";
            border-bottom: 2px solid #ccc;
            width: 100%;
            top: 20px;
            left: 50%;
            z-index: 2;
        }
        .stepper-item .step-counter {
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ccc;
            margin-bottom: 6px;
            color: white;
            font-weight: bold;
        }
        .stepper-item.completed .step-counter { background-color: #28a745; }
        .stepper-item.active .step-counter { background-color: #17a2b8; }
        .stepper-item.completed::after { border-bottom: 2px solid #28a745; }
        .stepper-item:first-child::before { content: none; }
        .stepper-item:last-child::after { content: none; }
        .step-name {
            font-size: 13px;
            color: #bdc3c7; /* Light grey for pending steps */
            font-weight: 600;
            margin-top: 8px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .completed .step-name {
            color: #28a745; /* Green for finished steps */
        }
        .active .step-name {
            color: #17a2b8; /* Blue for the current step */
        }
        .application-journey .step-container.rejected {
            background-color: transparent !important; /* Removes that big red block */
        }
        /* Update the Rejected State style */
        .step.rejected .circle {
            background-color: #ff7675; /* Professional Red */
            border: 2px solid #ff7675;
            color: white; /* Color of the 'X' */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step.rejected .label {
            color: #ff7675;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Change the progress line color leading to rejection */
        .progress-line.to-rejected {
            background-color: #ff7675;
        }
        /* Styling for the Rejected Circle */
        .stepper-item.rejected .step-counter {
            background-color: #ff7675 !important; /* Pure red circle */
            border: 2px solid #ff7675;
        }

        /* Styling for the Rejected Label */
        .stepper-item.rejected .step-name {
            color: #ff7675 !important;
            font-weight: bold;
        }

        /* Optional: Make the line leading to a rejection red too */
        .stepper-item.rejected::before {
            border-bottom: 2px solid #ff7675 !important;
        }
    </style>
</head>

<body th:object="${jobDetails}" style="font-family: 'Montserrat';height: 100%">

<header class="navbar navbar-expand-lg navbar-dark" style="background-color: #2d3436;">
    <label class="mt-2 ms-3 ms-md-5 font-weight-bold h5">
        <a th:href="@{/dashboard/}" style="color: white; text-decoration: none;">CareerStream</a>
        <span class="logo_com font-weight-bold h5" style="color: white">.com</span>
    </label>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" style="display: none;">
    <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
    </label>

    <div class="collapse navbar-collapse" id="navbarToggler">
        <ul class="navbar-nav m-auto mt-2 mt-lg-0">
            <li class="nav-item active"><a sec:authorize="hasAuthority('Job Seeker')" class="nav-link" th:href="@{/dashboard/}"><i class="fas fa-search"></i>Search for Jobs</a></li>
            <li class="nav-item "><a sec:authorize="hasAuthority('Job Seeker')" class="nav-link" th:href="@{/saved-jobs/}"><i class="fa-solid fa-eye"></i>View Saved Jobs</a></li>
            <li class="nav-item "><a sec:authorize="hasAuthority('Job Seeker')" class="nav-link" th:href="@{/job-seeker-profile/}"><i class="fa-solid fa-pencil"></i>Edit Profile</a></li>
            <li class="nav-item "><a sec:authorize="hasAuthority('Recruiter')" class="nav-link" th:href="@{/dashboard/add}"><i class="fa-solid fa-file-circle-plus"></i>Post New Job</a></li>
            <li class="nav-item active"><a sec:authorize="hasAuthority('Recruiter')" class="nav-link" th:href="@{/dashboard/}"> <i class="fa-solid fa-eye"></i>View Your Jobs</a></li>
            <li class="nav-item "><a sec:authorize="hasAuthority('Recruiter')" class="nav-link" th:href="@{/recruiter-profile/}"> <i class="fa-solid fa-pencil"></i>Edit Account</a></li>
        </ul>
        
        <img class="rounded-circle me-3" height="50px" width="50px"
             th:if="${user != null && user.photosImagePath != null}" th:src="@{${user.photosImagePath}}"/>

        <label th:if="${user != null && user.firstName != null && user.lastName != null}"
               th:text="${user.firstName + ' ' + user.lastName}" class="nav-item nav-link px-2 me-3" style="color: white"></label>
               
        <button class="myBtn-light me-5" onclick="window.location.href='/logout'">Logout</button>
    </div>
</header>

<section class="section">
    <div class="sidenav px-5"><div><hr/></div></div>
    <article>
        <div class="box px-3">
            <a class="mt-3 ms-3 primary" id="back-link"><i class="fa-solid fa-angle-left me-1"></i> Back to Search Results </a>
            <h1 class="primary-title mt-3"> Job Details </h1>
            <div class="ms-3">
                <h4 th:text="${jobDetails.jobTitle}" class="job-title text-left">Software Engineer</h4>
                <div class="mt-1">
                    <p th:text="${jobDetails.jobLocationId.city+', '+ jobDetails.jobLocationId.state}" class="m-0"> California, USA</p>
                    <p th:text="${jobDetails.jobCompanyId.name}">Company</p>
                </div>
            </div>
        </div>

        <div class="box mt-3">
            <label class="large-label px-3 mt-3"> Job Specs </label>
            <div class="job-row">
                <div class="row ">
                    <div class="col-md-3"><label class="text-left">Date Posted:<span th:text="${jobDetails.postedDate}">12 Nov, 2030</span></label></div>
                    <div class="col-md-3 text-center"><label> Salary: <span th:text="${jobDetails.salary}">50k - 120k/y</span></label></div>
                    <div class="col-md-3 text-center"><label>Type: <span th:text="${jobDetails.jobType}"> Full-time</span></label></div>
                    <div class="col-md-3 text-right"><label>Remote: <span th:text="${jobDetails.remote}">Remote</span></label></div>
                </div>
            </div>

            <div class="px-3 mb-3" sec:authorize="hasAuthority('Job Seeker')">
                <label class="large-label "> Job Description </label>
                <div th:utext="${jobDetails.descriptionOfJob}"></div>
            </div>

            <div class="px-3 mb-3" sec:authorize="hasAuthority('Recruiter')">
                <div class="row">
                    <div class="col-md-9">
                        <label class="large-label "> Job Description </label>
                        <div th:utext="${jobDetails.descriptionOfJob}"></div>
                    </div>
                    <div class="col-md-3 centerCandidate">
                        <div class="candidatesApplied">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <label class="font-weight-bold m-0">Candidates Applied</label>

                            </div>

                            <th:block th:each="applyList : ${applyList}">
                                <div class="mb-3 p-2" style="background: rgba(255,255,255,0.1); border-radius: 5px;">

                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <a th:if="${applyList.userId != null}"
                                           th:href="@{/job-seeker-profile/{id}(id=${applyList.userId.userAccountId})}"
                                           class="white text-decoration-none"
                                           th:text="${applyList.userId.firstName + ' ' + applyList.userId.lastName}">
                                            Candidate Name
                                        </a>

                                    </div>

                                    <form th:action="@{/dashboard/edit-status/{id}(id=${applyList.id})}" method="post">
                                        <select name="status" onchange="this.form.submit()" class="form-select form-select-sm bg-dark text-white border-secondary">
                                            <option th:selected="${applyList.status == null || applyList.status == 'Applied'}" value="Applied">Applied</option>
                                            <option th:selected="${applyList.status == 'Shortlisted'}" value="Shortlisted">Shortlisted</option>
                                            <option th:selected="${applyList.status == 'Interviewing'}" value="Interviewing">Interviewing</option>
                                            <option th:selected="${applyList.status == 'Selected'}" value="Selected">Selected</option>
                                            <option th:selected="${applyList.status == 'Rejected'}" value="Rejected">Rejected</option>
                                        </select>
                                    </form>
                                </div>
                            </th:block>
                            <div th:if="${applyList == null || applyList.size() == 0}" class="white small">
                                No candidates have applied yet.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-3 px-3" sec:authorize="hasAuthority('Job Seeker')">
                <div class="row">
                    <div class="col-md-12">
                        <form th:if="${alreadyApplied == false}" th:action="@{/job-details/apply/{id}(id=${jobDetails.jobPostId})}" th:object="${applyJob}" method="post">
                            <button class="btn-sec btn-red w-25" type="submit">Apply Now</button>
                        </form>

                        <div th:if="${alreadyApplied == true}" class="mt-5">
                            <h5 class="white mb-4"><i class="fas fa-map-marker-alt me-2"></i>Application Journey</h5>
                            <th:block th:each="app : ${applyList}">
                                <div th:if="${app.userId.userAccountId == user.userAccountId}" class="stepper-wrapper">

                                    <div class="stepper-item completed">
                                        <div class="step-counter"><i class="fas fa-check"></i></div>
                                        <div class="step-name">Applied</div>
                                    </div>

                                    <div class="stepper-item" th:classappend="${app.status == 'Shortlisted' || app.status == 'Interviewing' || app.status == 'Selected' || app.status == 'Rejected' ? 'completed' : ''}">
                                        <div class="step-counter">
                                            <i th:class="${app.status == 'Shortlisted' || app.status == 'Interviewing' || app.status == 'Selected' || app.status == 'Rejected' ? 'fas fa-check' : 'fas fa-user-tie'}"></i>
                                        </div>
                                        <div class="step-name">Shortlisted</div>
                                    </div>

                                    <div class="stepper-item" th:classappend="${app.status == 'Interviewing' || app.status == 'Selected' || app.status == 'Rejected' ? 'completed' : ''}">
                                        <div class="step-counter">
                                            <i th:class="${app.status == 'Interviewing' || app.status == 'Selected' || app.status == 'Rejected' ? 'fas fa-check' : 'fas fa-comments'}"></i>
                                        </div>
                                        <div class="step-name">Interviewing</div>
                                    </div>

                                    <div class="stepper-item" th:classappend="${app.status == 'Selected' ? 'completed' : (app.status == 'Rejected' ? 'rejected' : '')}">
                                        <div class="step-counter">
                                            <i th:class="${app.status == 'Selected' ? 'fas fa-trophy' : (app.status == 'Rejected' ? 'fas fa-times' : 'fas fa-flag-checkered')}"></i>
                                        </div>
                                        <div class="step-name" th:text="${app.status == 'Rejected' ? 'Rejected' : 'Selected'}">Selected</div>
                                    </div>

                                </div>
                            </th:block>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-3">
                        <form th:action="@{/job-details/save/{id}(id=${jobDetails.jobPostId})}" th:object="${applyJob}" method="post">
                            <button class="btn-sec btn-black w-100" type="submit" th:if="${alreadySaved == false}">Save Job</button>
                            <button class="btn-sec btn-black w-100" disabled th:if="${alreadySaved == true}">Already Saved</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="mt-3 px-3" sec:authorize="hasAuthority('Recruiter')">
                <div class="row">
                    <div class="col-md-3">
                        <form th:action="@{/dashboard/edit/{id}(id=${jobDetails.jobPostId})}" method="post">
                            <button class="btn-sec btn-red w-100" type="submit">Edit Job</button>
                        </form>
                    </div>
                    <div class="col-md-3">
                        <form th:action="@{/dashboard/deleteJob/{id}(id=${jobDetails.jobPostId})}" method="post">
                            <button class="btn-sec btn-black w-100" type="submit">Delete Job</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </article>
</section>

<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
<script type="text/javascript" th:src="@{/js/main.js}"></script>
<script>
    var element = document.getElementById('back-link');
    var referrer = document.referrer;
    if (referrer && referrer.includes(window.location.hostname)) {
        element.setAttribute('href', referrer);
    } else {
        element.setAttribute('href', '/dashboard/');
    }
</script>
</body>
</html>
